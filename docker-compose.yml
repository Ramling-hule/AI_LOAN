version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ai_loan_mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai_loan_ag
    networks:
      - loan_network

  # ── ChromaDB ─────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai_loan_chromadb
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - loan_network

  # ── Ollama (Local LLM) ───────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ai_loan_ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - loan_network
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Backend (Express.js) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_loan_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ai_loan_ag
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - loan_network

  # ── AI Services ───────────────────────────────────────────────────────────────
  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: ai_loan_ai_services
    restart: unless-stopped
    ports:
      - '5001:5001'
    env_file:
      - ./ai-services/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
      - ollama
    volumes:
      - ./ai-services:/app
      - /app/node_modules
    networks:
      - loan_network

  # ── Frontend (Vite dev server) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_loan_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - loan_network

volumes:
  mongo_data:
  chroma_data:
  ollama_data:

networks:
  loan_network:
    driver: bridge
